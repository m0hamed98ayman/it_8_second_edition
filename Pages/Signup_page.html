<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up my page </title>
  <link rel="stylesheet" href="../Style/theme.css">
  <link rel="stylesheet" href="../Style/signup_style.css">
  <style>

.container {
  display: flex;
  min-height: 100vh;
  gap: 35px; 
}
.main h1 {
    font-size: 30px;
    letter-spacing: 5px;
    text-transform: uppercase;
}
input {
    padding: 10px;
    border: none;
    border-bottom: 1px solid #ccc;
  }

  </style>
</head>
<body>

  <nav>
    <a class="luxurybutton" href="index.html"> Luxury Motors </a>
    <ul>
        <button id="dark-mode-button">🌙</button>
        <li><a href="index.html"> Home </a></li>
        <li><a href="Login_page.html"> Login </a></li>
        <li><a href="catalog_page.html"> Catalog </a></li>
        <li><a href="services_page.html"> Services </a></li>
        <li><a href="contact_us_page.html"> Contact </a></li>
    </ul>
        </nav><hr class ="hr1">
    <div class="container">

  <div class="images">
    <img src="../Assets/images/signup_car.jpeg" alt="Luxury car">
  </div>

  <div class="main">

   <div class="text">
      <h1>Create an account</h1>
      <p class="grey_text">Join us to explore the world of premium vehicles.</p>
    </div>
    
     <form id="my-form">
      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" placeholder="Enter your full name">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="************">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm Password">
      
      <div class="terms">
  <input type="checkbox" id="terms">
  <label for="terms">I agree to the Terms and Conditions</label>
    </div>
      <button class="btn" type="submit">Create an Account</button>
      <p id="footer-text"> Already have an account ? <a href="Login_page.html"> LOG IN </a></p>
      <script src="../JS/signUP.JS"></script>
      <script src="../JS/theme.js"></script>
      
  </div>
</div>
</body>
</html>
